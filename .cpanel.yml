---
deployment:
  tasks:
    # Live Laravel app root (where vendor/ and .env already live).
    - export DEPLOYPATH=/home/patricky/public_html
    # Copy code from the repo into the live site. vendor/, .env and storage/
    # are NOT in the repo, so they are left untouched.
    - /bin/cp -R app $DEPLOYPATH
    - /bin/cp -R bootstrap $DEPLOYPATH
    - /bin/cp -R config $DEPLOYPATH
    - /bin/cp -R database $DEPLOYPATH
    - /bin/cp -R public $DEPLOYPATH
    - /bin/cp -R resources $DEPLOYPATH
    - /bin/cp -R routes $DEPLOYPATH
    - /bin/cp -f artisan $DEPLOYPATH
    - /bin/cp -f composer.json $DEPLOYPATH
    - /bin/cp -f composer.lock $DEPLOYPATH
    # Clear Laravel's cached config/routes so changes take effect immediately.
    - /bin/rm -f $DEPLOYPATH/bootstrap/cache/config.php
    - /bin/rm -f $DEPLOYPATH/bootstrap/cache/routes-v7.php
    # Record each deploy so you can confirm it ran.
    - /bin/echo "Deployed on $(date)" >> $DEPLOYPATH/storage/logs/deploy.log
